<body>
  <div id="root"></div>
  <script type="text/babel">





/* ===== HEADER ===== */
const NAV_ITEMS = [
{ label: 'Seguir envíos', items: ['Seguir mi envío', 'Ver mis envíos'] },
{ label: 'Hacer envíos', items: ['Enviar un paquete', 'Cotizar envío', 'Preparar mi envío'] },
{ label: 'Asistencia', items: ['Centro de ayuda', 'Reclamos', 'Arrepentimiento de compra'] },
{ label: 'Sucursales', items: ['Buscar sucursal', 'Horarios de atención'] },
{ label: 'Para tu negocio', items: ['Soluciones logísticas', 'Integraciones eCommerce', 'Andreani API'] }];


function ChevronDown({ open }) {
  return (
    <svg width="10" height="10" viewBox="0 0 10 10" fill="none" style={{ transform: open ? 'rotate(180deg)' : 'rotate(0)', transition: 'transform 0.2s' }}>
      <path d="M1.5 3.5L5 7L8.5 3.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"></path>
    </svg>);

}

function useIsMobile(bp = 1023) {
  const [m, setM] = React.useState(window.innerWidth <= bp);
  React.useEffect(() => {const h = () => setM(window.innerWidth <= bp);window.addEventListener('resize', h);return () => window.removeEventListener('resize', h);}, [bp]);
  return m;
}

function Header({ onNavigate }) {
  const [openDD, setOpenDD] = React.useState(null);
  const [mobOpen, setMobOpen] = React.useState(false);
  const isMobile = useIsMobile(1023);

  React.useEffect(() => {const h = () => setOpenDD(null);document.addEventListener('click', h);return () => document.removeEventListener('click', h);}, []);

  const ANDREANI_LINKS = {
    'Preparar mi envío': 'https://www.andreani.com/hacer-un-envio',
    'Centro de ayuda': 'https://www.andreani.com/ayuda',
    'Reclamos': 'https://www.andreani.com/ayuda/reclamos',
    'Arrepentimiento de compra': 'https://www.andreani.com/ayuda/arrepentimiento-de-compra',
    'Horarios de atención': 'https://www.andreani.com/sucursales',
    'Soluciones logísticas': 'https://www.andreani.com/para-tu-negocio',
    'Integraciones eCommerce': 'https://www.andreani.com/para-tu-negocio/ecommerce',
    'Andreani API': 'https://developers.andreani.com'
  };

  const navAction = (label, item) => {
    setOpenDD(null);setMobOpen(false);
    // → Nuestra app
    if (item === 'Seguir mi envío' || item === 'Ver mis envíos') {onNavigate('home', 'seguir');return;}
    if (item === 'Cotizar envío' || item === 'Enviar un paquete') {onNavigate('home', 'cotizar');return;}
    if (item === 'Buscar sucursal') {onNavigate('sucursales');return;}
    // → Andreani real
    const url = ANDREANI_LINKS[item];
    if (url) window.open(url, '_blank');
  };

  return (
    <header style={{ position: 'fixed', top: 0, left: 0, right: 0, height: 64, zIndex: 999, backgroundColor: '#fff', boxShadow: '0 1px 9px 0 hsla(0,0%,76%,.3)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div style={{ maxWidth: 1536, width: '100%', display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 24px', height: '100%' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          {isMobile &&
          <button onClick={() => setMobOpen(!mobOpen)} style={{ display: 'flex', border: 'none', backgroundColor: 'transparent', fontSize: 24, cursor: 'pointer', padding: 8, color: '#272a2f' }}>
              {mobOpen ? '✕' : '☰'}
            </button>
          }
          <img src="https://componentesui.blob.core.windows.net/recursos/logos-gla/isologo-195.png" alt="Andreani" style={{ cursor: 'pointer', height: "65px", width: "195px", padding: "0px", margin: "-4px" }} onClick={() => onNavigate('home', 'seguir')} />
        </div>

        {!isMobile &&
        <nav style={{ display: 'flex', alignItems: 'center', gap: 4, flex: 1, justifyContent: 'flex-start', marginLeft: 32 }}>
            {NAV_ITEMS.map((item, idx) =>
          <div key={idx} style={{ position: 'relative' }}>
                <button onClick={(e) => {e.stopPropagation();setOpenDD(openDD === idx ? null : idx);}}
            onMouseEnter={() => setOpenDD(idx)}
            style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '8px 14px', fontFamily: 'Rubik, sans-serif', fontSize: 14, fontWeight: 500, color: '#272a2f', cursor: 'pointer', borderRadius: 8, border: 'none', backgroundColor: openDD === idx ? '#f5f5f5' : 'transparent', transition: 'background 0.15s' }}>
                  {item.label} <ChevronDown open={openDD === idx} />
                </button>
                {openDD === idx &&
            <div onClick={(e) => e.stopPropagation()} style={{ position: 'absolute', top: 'calc(100% + 4px)', left: 0, backgroundColor: '#fff', borderRadius: 8, boxShadow: '0 4px 16px rgba(0,0,0,0.12)', padding: '8px 0', minWidth: 240, zIndex: 1000 }}>
                    {item.items.map((sub, si) =>
              <button key={si} onClick={() => navAction(item.label, sub)}
              onMouseEnter={(e) => e.target.style.backgroundColor = '#fafafa'}
              onMouseLeave={(e) => e.target.style.backgroundColor = 'transparent'}
              style={{ padding: '12px 20px', fontFamily: 'Roboto, sans-serif', fontSize: 14, color: '#4e555e', cursor: 'pointer', display: 'block', border: 'none', backgroundColor: 'transparent', width: '100%', textAlign: 'left' }}>
                        {sub}
                      </button>
              )}
                  </div>
            }
              </div>
          )}
          </nav>
        }

        <a href="https://transaccional-router-login.andreani.com" target="_blank" rel="noopener noreferrer" style={{ padding: '8px 24px', borderRadius: 24, border: '1.5px solid #d71920', backgroundColor: '#fff', color: '#d71920', fontFamily: 'Rubik, sans-serif', fontSize: 14, fontWeight: 500, cursor: 'pointer', minWidth: 100, textDecoration: 'none', display: 'inline-flex', alignItems: 'center', transition: 'all 0.2s' }}
        onMouseEnter={(e) => {e.currentTarget.style.backgroundColor = '#d71920';e.currentTarget.style.color = '#fff';}}
        onMouseLeave={(e) => {e.currentTarget.style.backgroundColor = '#fff';e.currentTarget.style.color = '#d71920';}}>
          Ingresar
        </a>
      </div>

      {isMobile && mobOpen &&
      <>
          <div onClick={() => setMobOpen(false)} style={{ position: 'fixed', top: 64, left: 0, right: 0, bottom: 0, backgroundColor: 'rgba(0,0,0,0.4)', zIndex: 998 }}></div>
          <div style={{ position: 'fixed', top: 64, right: 0, bottom: 0, width: 300, backgroundColor: '#fff', zIndex: 999, overflowY: 'auto', padding: '8px 0', boxShadow: '-4px 0 16px rgba(0,0,0,0.1)' }}>
            {NAV_ITEMS.map((item, idx) =>
          <div key={idx}>
                <button onClick={(e) => {e.stopPropagation();setOpenDD(openDD === idx ? null : idx);}}
            style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', width: '100%', padding: '14px 24px', fontFamily: 'Rubik, sans-serif', fontWeight: 500, fontSize: 15, color: '#272a2f', border: 'none', backgroundColor: 'transparent', cursor: 'pointer' }}>
                  {item.label} <ChevronDown open={openDD === idx} />
                </button>
                {openDD === idx && item.items.map((sub, si) =>
            <button key={si} onClick={() => navAction(item.label, sub)}
            style={{ display: 'block', width: '100%', padding: '10px 24px 10px 40px', fontFamily: 'Roboto, sans-serif', fontSize: 14, color: '#6c7580', border: 'none', backgroundColor: 'transparent', cursor: 'pointer', textAlign: 'left' }}>
                    {sub}
                  </button>
            )}
              </div>
          )}
          </div>
        </>
      }
    </header>);

}

/* ===== HERO - SEGUIR ENVIO ===== */
function HeroSeguirEnvio({ onTrack }) {
  const [num, setNum] = React.useState('');
  const [err, setErr] = React.useState('');

  const track = () => {
    if (!num.trim()) {setErr('Ingresá un número de seguimiento');return;}
    if (!/^\d+$/.test(num.trim())) {setErr('Solo se permiten números, sin guiones ni puntos');return;}
    setErr('');onTrack(num.trim());
  };

  return (
    <div>
      <h1 style={{ fontFamily: 'Rubik, sans-serif', fontWeight: 500, lineHeight: '44px', color: '#272a2f', margin: '0 0 8px', fontSize: 40 }}>Seguí tu envío ahora</h1>
      <p style={{ fontFamily: 'Roboto, sans-serif', fontSize: 18, lineHeight: '28px', color: '#6c7580', margin: '0 0 32px' }}>Conocé el estado de tus envíos en todo momento.</p>
      <div style={{ display: 'flex', marginBottom: 8 }}>
        <input type="text" value={num} onChange={(e) => {setNum(e.target.value);setErr('');}}
        onKeyDown={(e) => e.key === 'Enter' && track()}
        placeholder="Ingresá el número de seguimiento"
        style={{ flex: 1, height: 52, padding: '0 16px', border: '1px solid #c0c3c8', borderRight: 'none', borderRadius: '8px 0 0 8px', fontFamily: 'Roboto, sans-serif', fontSize: 16, color: '#272a2f', outline: 'none', backgroundColor: '#fff' }} />
        <button onClick={track} style={{ width: 52, height: 52, backgroundColor: '#d71920', border: 'none', borderRadius: '0 8px 8px 0', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M16.5 16.5L12.375 12.375M14.25 7.875C14.25 11.396 11.396 14.25 7.875 14.25C4.354 14.25 1.5 11.396 1.5 7.875C1.5 4.354 4.354 1.5 7.875 1.5C11.396 1.5 14.25 4.354 14.25 7.875Z" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"></path></svg>
        </button>
      </div>
      {err && <p style={{ fontFamily: 'Roboto, sans-serif', fontSize: 14, color: '#d71920', fontStyle: 'italic', margin: '4px 0 0' }}>{err}</p>}
      <p style={{ fontFamily: 'Roboto, sans-serif', fontSize: 14, color: '#6c7580', fontStyle: 'italic', margin: '4px 0 0' }}>Sin guiones ni puntos. Ej. 360000000000000</p>
      <div style={{ marginTop: 48 }}>
        <p style={{ fontFamily: 'Rubik, sans-serif', fontWeight: 500, fontSize: 16, color: '#272a2f', margin: '0 0 4px' }}>¿No tenés el número de seguimiento?</p>
        <p style={{ fontFamily: 'Roboto, sans-serif', fontSize: 14, color: '#6c7580', margin: 0 }}>
          <span style={{ color: '#1a73e8', cursor: 'pointer' }}><a href="https://transaccional-router-login.andreani.com" target="_blank" rel="noopener noreferrer" style={{ color: '#1a73e8' }}>Iniciá sesión o registrate</a></span> para ver todos los envíos asociados a tu e-mail o DNI.
        </p>
      </div>
    </div>);

}

/* ===== HERO - COTIZAR ENVIO ===== */
function HeroCotizarEnvio({ onQuote }) {
  const [f, setF] = React.useState({ desde: '', hasta: '', alto: '', ancho: '', largo: '', peso: '' });
  const [errs, setErrs] = React.useState({});
  const upd = (k, v) => {setF({ ...f, [k]: v });setErrs({ ...errs, [k]: false });};

  const cotizar = () => {
    const ne = {};
    Object.keys(f).forEach((k) => {if (!f[k].trim()) ne[k] = true;});
    if (Object.keys(ne).length) {setErrs(ne);return;}
    setErrs({});onQuote(f);
  };

  const inpS = (has) => ({ height: 48, padding: '0 12px', border: `1px solid ${has ? '#d71920' : '#c4c8cc'}`, borderRadius: 4, fontFamily: 'Roboto, sans-serif', fontSize: 16, color: '#272a2f', width: '100%', boxSizing: 'border-box' });
  const lblS = { fontFamily: 'Roboto, sans-serif', fontSize: 14, color: '#6c7580', marginBottom: 4, display: 'flex', alignItems: 'center', gap: 4 };

  return (
    <div>
      <h1 style={{ fontFamily: 'Rubik, sans-serif', fontWeight: 500, fontSize: 32, lineHeight: '44px', color: '#272a2f', margin: '0 0 4px' }}>Cotizá tu paquete</h1>
      <p style={{ margin: '0 0 24px' }}>
        <span style={{ fontFamily: 'Roboto, sans-serif', fontSize: 14, color: '#1a73e8', cursor: 'pointer', textDecoration: 'underline' }}>Cotizar otro servicio (sobre, pallet, bigger o vinos)</span>
      </p>
      <div style={{ display: 'flex', gap: 16, marginBottom: 20 }}>
        <div style={{ flex: 1 }}>
          <label style={lblS}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="#6c7580" strokeWidth="1.5"></circle><circle cx="7" cy="7" r="2" fill="#6c7580"></circle></svg>
            Desde
          </label>
          <input type="text" value={f.desde} onChange={(e) => upd('desde', e.target.value)} placeholder="CP o Localidad" style={inpS(errs.desde)} />
        </div>
        <div style={{ flex: 1 }}>
          <label style={lblS}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="#6c7580" strokeWidth="1.5"></circle><circle cx="7" cy="7" r="2" fill="#6c7580"></circle></svg>
            Hasta
          </label>
          <input type="text" value={f.hasta} onChange={(e) => upd('hasta', e.target.value)} placeholder="CP o Localidad" style={inpS(errs.hasta)} />
        </div>
      </div>
      <div style={{ marginBottom: 20 }}>
        <label style={{ ...lblS, marginBottom: 8 }}>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1.5" y="1.5" width="11" height="11" rx="1.5" stroke="#6c7580" strokeWidth="1.5"></rect><line x1="1.5" y1="5" x2="12.5" y2="5" stroke="#6c7580" strokeWidth="1.5"></line></svg>
          Medidas del paquete
        </label>
        <div style={{ display: 'flex', gap: 12 }}>
          {[{ k: 'alto', l: 'Alto', u: 'cm' }, { k: 'ancho', l: 'Ancho', u: 'cm' }, { k: 'largo', l: 'Largo', u: 'cm' }, { k: 'peso', l: 'Peso', u: 'gr' }].map((x) =>
          <div key={x.k} style={{ flex: 1, position: 'relative' }}>
              <input type="text" value={f[x.k]} onChange={(e) => upd(x.k, e.target.value)} placeholder={x.l} style={{ ...inpS(errs[x.k]), paddingRight: 36 }} />
              <span style={{ position: 'absolute', right: 12, top: '50%', transform: 'translateY(-50%)', fontFamily: 'Roboto, sans-serif', fontSize: 14, color: '#9e9e9e', pointerEvents: 'none' }}>{x.u}</span>
            </div>
          )}
        </div>
      </div>
      <div style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: 32 }}>
        <button onClick={cotizar} style={{ padding: '12px 32px', backgroundColor: '#d71920', color: '#fff', border: 'none', borderRadius: 4, fontFamily: 'Rubik, sans-serif', fontSize: 16, fontWeight: 500, cursor: 'pointer', transition: 'background 0.2s' }}
        onMouseEnter={(e) => e.target.style.backgroundColor = '#b6040b'}
        onMouseLeave={(e) => e.target.style.backgroundColor = '#d71920'}>
          Cotizar
        </button>
      </div>
      <div>
        <p style={{ fontFamily: 'Rubik, sans-serif', fontWeight: 500, fontSize: 16, color: '#272a2f', margin: '0 0 4px' }}>¿Hacés envíos para tu negocio?</p>
        <p style={{ fontFamily: 'Roboto, sans-serif', fontSize: 14, color: '#6c7580', margin: 0 }}>
          <a href="https://transaccional-router-login.andreani.com" target="_blank" rel="noopener noreferrer" style={{ color: '#1a73e8' }}>Iniciá sesión</a>{' '}o{' '}
          <a href="https://transaccional-router-login.andreani.com" target="_blank" rel="noopener noreferrer" style={{ color: '#1a73e8' }}>registrate</a> para hacer tus envíos.
        </p>
      </div>
    </div>);

}

/* ===== HERO SECTION ===== */
function HeroSection({ activeTab, setActiveTab, onTrack, onQuote }) {
  const isMobile = useIsMobile(900);
  return (
    <div style={{ backgroundColor: '#fafafa', width: '100%' }}>
      <section style={{
        maxWidth: isMobile ? '100%' : 1536,
        margin: '0 auto',
        backgroundImage: isMobile ? 'none' : activeTab === 'seguir' ? "url('assets/hero-seguir.svg')" : "url('assets/hero-cotizar.svg')",
        backgroundSize: 'cover',
        backgroundRepeat: 'no-repeat',
        backgroundPosition: 'center',
        backgroundColor: isMobile ? '#dfe1e3' : 'transparent',
        display: 'flex',
        alignItems: 'center',
        flexDirection: isMobile ? 'column' : 'row',
        padding: isMobile ? '24px 16px' : '12px 0 0 0',
        minHeight: isMobile ? 'auto' : 658
      }}>
        <div style={{ maxWidth: isMobile ? '100%' : 630, width: isMobile ? '100%' : 630, flexShrink: 0, backgroundColor: '#fff', borderRadius: 8, borderBottomRightRadius: isMobile ? 8 : 0, overflow: 'hidden', margin: isMobile ? 0 : '64px 0 64px 32px', boxShadow: '0 1px 9px 0 hsla(0,0%,76%,.3)' }}>
          <div style={{ display: 'flex', borderBottom: '1px solid #e0e0e0' }}>
            {['seguir', 'cotizar'].map((key) => {
              const isActive = activeTab === key;
              return (
                <button key={key} onClick={() => setActiveTab(key)} style={{
                  flex: 1, padding: '16px 24px', border: 'none', backgroundColor: 'transparent',
                  fontFamily: 'Rubik, sans-serif', fontSize: 18, fontWeight: isActive ? 700 : 400,
                  color: isActive ? '#272a2f' : '#6c7580', cursor: 'pointer',
                  borderBottom: isActive ? '3px solid #d71920' : '3px solid transparent', transition: 'all 0.2s'
                }}>
                  {key === 'seguir' ? 'Seguir envío' : 'Cotizar envío'}
                </button>);
            })}
          </div>
          <div style={{ padding: isMobile ? '24px 16px 32px' : '32px', minHeight: isMobile ? 'auto' : 470 }}>
            {activeTab === 'seguir' ? <HeroSeguirEnvio onTrack={onTrack} /> : <HeroCotizarEnvio onQuote={onQuote} />}
          </div>
        </div>
      </section>
    </div>);

}

/* ===== TRACKING RESULTS ===== */

const ESTADO_COLORS = {
  green: { bg: '#1f7e5a', light: '#e6f4ef', text: '#1f7e5a' },
  red: { bg: '#d71920', light: '#fbe8e9', text: '#d71920' },
  orange: { bg: '#e67e22', light: '#fdf2e9', text: '#e67e22' }
};

const STEP_ICONS = {
  flag:

/* ===== APP ===== */
function App() {
  const [view, setView] = React.useState('home');
  const [tab, setTab] = React.useState('seguir');
  const [tNum, setTNum] = React.useState('');
  const [qData, setQData] = React.useState(null);

  const nav = (v, t) => {setView(v);if (t) setTab(t);window.scrollTo({ top: 0, behavior: 'smooth' });};
  const track = (n) => {setTNum(n);setView('tracking');window.scrollTo({ top: 0 });};
  const quote = (d) => {setQData(d);setView('quote');window.scrollTo({ top: 0 });};
  const back = () => {setView('home');window.scrollTo({ top: 0 });};

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
      <Header onNavigate={nav} />
      <div style={{ marginTop: 64, flex: 1 }}>
        <div key={view} style={{ opacity: 1 }}>
          {view === 'home' && <><HeroSection activeTab={tab} setActiveTab={setTab} onTrack={track} onQuote={quote} /><QuickAccessCards onNavigate={nav} /><ServicesSection /><EstamosCircaSection onNavigate={nav} /><AwardBanner /><FAQSection /></>}
          {view === 'tracking' && <TrackingResults trackingNumber={tNum} onBack={back} />}
          {view === 'quote' && <QuoteResults quoteData={qData} onBack={back} />}
          {view === 'sucursales' && <SucursalesView onBack={back} />}
        </div>
      </div>
      <Footer />
      <WhatsAppBtn />
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
